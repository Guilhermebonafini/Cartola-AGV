<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="footer.css">
    <title>Document</title>
</head>
<body>
    <style>



    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    header{
        background-color:  rgb(0, 31, 183);
        color: rgb(255, 255, 255);
        padding: 10px;
        font-family: Arial, Helvetica, sans-serif;
        width: 100%;
        height: 90px;
    }
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-size: cover;
        background-attachment: fixed;

    }


    .texto{
     
     
        border-radius: 20px;
        text-align: start;
        width: 50%;
        align-items: center;
        margin: 10px;
        height: 200px;
        position: absolute;
        background:linear-gradient(45deg,rgb(255, 255, 255), rgb(0, 0, 255), rgb(0, 0, 77));
        box-shadow: 1px 10px 15px rgba(0, 0, 0, 0.466);
        background-size: 150% 150%;
        animation: color 5s ease-in-out infinite;
        top: 50%;
        transform: translateY(-50%);
    }


    @keyframes color {
    
        0%{
            background-position: 0% 50%;
        }
        50%{
            background-position: 100% 50%;
        }
        100%{
            background-position: 0% 50%;
        }


    }

    header a:hover{
        transform: scale(1.1);
        transition-duration: .5s;

    }


    header a{
        text-decoration: none;
        position: relative;
        bottom: 55px;
    }

    .texto h1, .texto p{
        position: relative;
        top: 40%;
        translate: calc(- 50%);
        left: 100px;
        color: white;
    }

    main .bola{
        position: absolute;
        right: 0px;
        top: 0px;
        height: 500px;
        width: 650px;
        z-index: -1;
        border-left: 20px solid rgb(20, 114, 255);
    }

    .agv{
        position: absolute;
        left: 0px;
        top: 0px;
        height: 500px;
        width: 1280px;
        z-index: -1;

    }


    #cima{
        display: flex;
        justify-content: space-around;
        align-items: center;
        height: 390px;
        border-bottom: 10px solid rgb(20, 114, 255);
        box-shadow: 1px 10px 15px rgba(0, 0, 0, 0.466);
    }

    </style>



    <header>
            <a href="index.html" target="_self">
                <img src="agv-.png" height="180px">
            </a>
    </header>


    <main>

        <div id="cima">
            <div class="texto">
                <h1>Interclasse</h1>
                <p>Em breve...</p>
            </div>


            
        
        </div>
        
        <div class="conteudo">
            <p>
               
            </p>
        </div>


    </main>

</body>
</html>
